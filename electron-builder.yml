appId: cc.streamdesk.worker
productName: StreamDesk Worker
copyright: Copyright © 2026 StreamDesk

directories:
  buildResources: resources
  output: release/${version}

afterPack: scripts/adhoc-sign-mac.cjs

files:
  - out/**
  - resources/**
  - package.json
  - '!**/*.map'
  - '!**/*.d.ts'
  - '!**/*.ts'
  - '!**/*.tsx'
  - '!resources/admin-logo.webp'
  - '!resources/icon.icns'
  - '!resources/icon.iconset/**'
  - '!**/.vscode/*'
  - '!**/{README.md,LICENSE.md}'
  - '!**/{.git,.gitignore,.eslintrc.cjs}'
  - '!**/node_modules/*/{README.md,*.md}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'

asarUnpack:
  - resources/**
  - 'node_modules/playwright/**'
  - 'node_modules/playwright-core/**'

mac:
  target:
    - dmg
    - zip
  icon: resources/icon.icns
  artifactName: StreamDesk-Worker-${version}-${arch}.${ext}
  category: public.app-category.utilities
  # 不签名构建（等买证书后再开启 hardenedRuntime + entitlements）
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
  # 不签名构建：用户首次启动会被 SmartScreen 警告
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  shortcutName: StreamDesk Worker

linux:
  target:
    - AppImage
  category: Utility

# 发布到 GitHub Releases（用于 electron-updater 自动更新）
# 不签名时仍可用，但 macOS 自动更新会因签名校验失败而拒绝
# 等买了 Apple Developer 证书后再启用自动更新
publish:
  provider: github
  owner: Kccz
  repo: streamdesk-worker
  releaseType: release
